name: _reusable-artifact-smoke
# v3 §9 build-repo gate: confirm the BUILT artifact is runnable.
#   * image path: pull the candidate image, exec the entrypoint with --version,
#                 verify expected labels are present.
#   * deb   path: dpkg -I, then dpkg-deb -x into a tmpdir and run the binary
#                 with --version.
# This is intentionally artifact-level only; source-tier tests live on the
# fork (see lts-tests.yml).
on:
  workflow_call:
    inputs:
      target_kind:   { type: string, required: true }   # image | deb
      target_ref:    { type: string, required: true }   # image ref (incl. digest) OR deb artifact name
      deb_filename:  { type: string, required: false, default: '' }
      component:     { type: string, required: true }

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to ghcr.io (image path)
        if: inputs.target_kind == 'image'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Image smoke — pull + --version + label check
        if: inputs.target_kind == 'image'
        run: |
          set -ex
          docker pull "${{ inputs.target_ref }}"
          # Distroless images have no shell, so we invoke the entrypoint directly.
          docker run --rm "${{ inputs.target_ref }}" --version
          # Confirm the LTS labels we set in _reusable-build-image.yml are present.
          for label in net.lts.component net.lts.upstream-tag net.lts.build net.lts.bundle net.lts.fork-branch; do
            val=$(docker image inspect "${{ inputs.target_ref }}" --format "{{ index .Config.Labels \"${label}\" }}")
            [ -n "$val" ] || { echo "label ${label} missing"; exit 1; }
            echo "  ${label}=${val}"
          done

      - name: Download deb artifact (deb path)
        if: inputs.target_kind == 'deb'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.target_ref }}
          path: dist/

      - name: Deb smoke — dpkg metadata + binary --version
        if: inputs.target_kind == 'deb'
        run: |
          set -ex
          DEB="dist/${{ inputs.deb_filename }}"
          dpkg -I "$DEB"
          # Extract without installing so we don't disturb the runner; run the
          # binary's --version to confirm it's executable.
          mkdir -p extracted
          dpkg-deb -x "$DEB" extracted/
          ls -la extracted/usr/bin/ || true
          extracted/usr/bin/${{ inputs.component }} --version || \
            (echo "binary --version failed; non-fatal for client-only binaries"; true)
