name: _reusable-policy-gate
# OPA + Conftest over the assembled release metadata.
on:
  workflow_call:
    inputs:
      component: { type: string, required: true }
      tier:      { type: string, required: true }

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Conftest (pinned)
        run: |
          set -e
          source ./toolchains/tool-pins.env
          curl -sSfL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin conftest
          conftest --version

      - name: Download evidence (release-metadata.json lives here)
        uses: actions/download-artifact@v4
        with:
          name: evidence-${{ inputs.component }}
          path: evidence/

      - name: Run policy bundle
        # Policies read input.tier directly from release-metadata.json; no
        # --data flag needed (and `--data tier=...` was being misparsed as a
        # filesystem path).
        run: |
          conftest test \
            --policy policy \
            --namespace lts.release \
            evidence/release-metadata.json
