name: _reusable-sbom
# Produce a CycloneDX JSON SBOM (Syft) for an image (by digest) or a deb file.
# The SBOM is uploaded as an artifact so downstream jobs (scan, sign, evidence,
# gate) can fetch it explicitly — reusable workflows don't share filesystems.
on:
  workflow_call:
    inputs:
      target_kind:    { type: string, required: true }   # image | deb
      target_ref:     { type: string, required: true }   # image ref incl. digest, OR artifact name for deb (deb-<component>)
      deb_filename:   { type: string, required: false, default: '' }
      component:      { type: string, required: true }
      upstream_tag:   { type: string, required: true }
    outputs:
      sbom_name:
        value: ${{ jobs.sbom.outputs.sbom_name }}

permissions:
  contents: read
  packages: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    outputs:
      sbom_name: ${{ steps.run.outputs.sbom_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft (pinned)
        run: |
          set -e
          source ./toolchains/tool-pins.env
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
          syft version

      - name: Log in to ghcr.io (for image SBOMs)
        if: inputs.target_kind == 'image'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Download deb artifact (deb path)
        if: inputs.target_kind == 'deb'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.target_ref }}
          path: dist/

      - name: Generate SBOM
        id: run
        run: |
          mkdir -p sbom
          NAME="sbom-${{ inputs.component }}.cdx.json"
          if [ "${{ inputs.target_kind }}" = "image" ]; then
            syft "registry:${{ inputs.target_ref }}" -o cyclonedx-json > "sbom/${NAME}"
          else
            syft "file:dist/${{ inputs.deb_filename }}" -o cyclonedx-json > "sbom/${NAME}"
          fi
          echo "sbom_name=${NAME}" >> "$GITHUB_OUTPUT"
          jq '.components | length' "sbom/${NAME}" | xargs -I{} echo "components={}"

      - name: Verify CPE/PURL coverage
        run: ./scripts/verify-cpe-coverage.sh "sbom/${{ steps.run.outputs.sbom_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ inputs.component }}
          path: sbom/${{ steps.run.outputs.sbom_name }}
          retention-days: 90
