name: _reusable-scan
# Syft+Grype scan (Aikido temporarily disabled; trivy commented for test).
# Reads the SBOM artifact produced by _reusable-sbom and writes a normalised
# findings.json plus a coverage matrix summary, both uploaded for downstream
# jobs.
on:
  workflow_call:
    inputs:
      target_kind:   { type: string, required: true }
      target_ref:    { type: string, required: true }
      deb_filename:  { type: string, required: false, default: '' }
      component:     { type: string, required: true }
    outputs:
      findings_name:
        value: ${{ jobs.scan.outputs.findings_name }}

permissions:
  contents: read
  packages: read

jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      findings_name: ${{ steps.merge.outputs.findings_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Grype (pinned)
        run: |
          set -e
          source ./toolchains/tool-pins.env
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"
          grype version

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ inputs.component }}
          path: sbom/

      - name: Download deb artifact (deb path)
        if: inputs.target_kind == 'deb'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.target_ref }}
          path: dist/

      - name: Locate SBOM file
        id: locate
        run: echo "path=$(ls sbom/*.cdx.json | head -n1)" >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────────────────────────────────
      # Aikido (primary scanner per §8) temporarily disabled for the test
      # repo until procurement closes. Uncomment + set AIKIDO_TOKEN secret.
      # ──────────────────────────────────────────────────────────────────────
      # - name: Aikido scan (primary)
      #   env:
      #     AIKIDO_TOKEN: ${{ secrets.AIKIDO_TOKEN }}
      #   run: |
      #     mkdir -p scans
      #     ./scripts/aikido-scan.sh --sbom "${{ steps.locate.outputs.path }}" --out scans/aikido.json

      - name: Grype scan (supplemental)
        run: |
          mkdir -p scans
          # Grype exits non-zero only on tool error; severity policy is enforced
          # by the OPA gate over the merged findings file, not by grype's exit.
          grype sbom:"${{ steps.locate.outputs.path }}" -o json > scans/grype.json
          echo "matches=$(jq '.matches | length' scans/grype.json)"

      # Trivy intentionally omitted from the test setup; merge-findings still
      # accepts a missing input.

      - name: Merge findings
        id: merge
        run: |
          ./scripts/merge-findings.sh \
            --grype scans/grype.json \
            --out scans/findings.json
          jq '.summary' scans/findings.json
          echo "findings_name=findings-${{ inputs.component }}.json" >> "$GITHUB_OUTPUT"
          mv scans/findings.json "scans/findings-${{ inputs.component }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: findings-${{ inputs.component }}
          path: scans/
          retention-days: 90
