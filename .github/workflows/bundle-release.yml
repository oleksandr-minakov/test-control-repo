name: bundle-release
on:
  workflow_dispatch:
    inputs:
      bundle: { type: string, required: true, default: k8s-1.32-lts }
      tag:    { type: string, required: true }   # e.g. 2026.06
  schedule:
    - cron: '0 6 22 * *'   # T-10d before next month

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  collect-streams:
    runs-on: ubuntu-latest
    outputs:
      manifest: ${{ steps.c.outputs.path }}
    steps:
      - uses: actions/checkout@v4
      - id: c
        run: |
          ./scripts/collect-bundle-streams.sh \
            --bundle "${{ inputs.bundle || 'k8s-1.32-lts' }}" \
            --release-tag "${{ inputs.tag || 'rc' }}" \
            --out bundle-manifest.json
          echo "path=bundle-manifest.json" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with: { name: bundle-manifest, path: bundle-manifest.json }

  integration-smoke:
    needs: collect-streams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: bundle-manifest, path: . }
      - name: Install kind
        run: |
          curl -fsSL -o /usr/local/bin/kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          sudo install -m 0755 /usr/local/bin/kind /usr/local/bin/kind || true
          kind version
      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Bundle smoke
        run: ./scripts/bundle-smoke.sh --manifest bundle-manifest.json

  bundle-gate:
    needs: [collect-streams, integration-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: bundle-manifest, path: . }
      - name: Install conftest
        run: |
          source ./toolchains/tool-pins.env
          curl -sSfL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin conftest
      - name: Bundle policy gate
        # Bundle metadata is shape-different from component metadata; policy
        # passes if every stream resolves and the manifest validates.
        run: |
          jq -e '.streams | length > 0' bundle-manifest.json
          jq -e '.streams[] | select((.rendered.oci_canonical // "") != "" or (.rendered.deb_version // "") != "")' bundle-manifest.json >/dev/null

  open-promotion-pr:
    needs: bundle-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: bundle-manifest, path: . }
      - name: Open PR pinning bundle digests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bundles/releases
          ./scripts/promote-bundle.sh \
            --manifest bundle-manifest.json \
            --release-tag "${{ inputs.tag }}"
