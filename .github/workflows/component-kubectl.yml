name: kubectl
on:
  workflow_dispatch:
    inputs:
      lts_build: { type: string, required: true, default: "1" }
  pull_request:
    paths:
      - components/kubectl.yaml
      - .github/workflows/component-kubectl.yml
      - .github/workflows/_reusable-*.yml
      - policy/**
      - scripts/**
  schedule:
    - cron: '15 5 * * 1'

permissions:
  contents: read
  # packages: write required by the shared _reusable-sign.yml even on the deb
  # path (GHA requires callers to grant >= reusable's declared permissions);
  # nothing actually pushes to ghcr from this workflow.
  packages: write
  id-token: write

jobs:
  load-descriptor:
    runs-on: ubuntu-latest
    outputs:
      upstream_tag:    ${{ steps.d.outputs.upstream_tag }}
      bundle:          ${{ steps.d.outputs.bundle }}
      fork_repo:       ${{ steps.d.outputs.fork_repo }}
      lts_branch:      ${{ steps.d.outputs.lts_branch }}
      toolchain_image: ${{ steps.d.outputs.toolchain_image }}
      entrypoint:      ${{ steps.d.outputs.entrypoint }}
      package_name:    ${{ steps.d.outputs.package_name }}
      maintainer:      ${{ steps.d.outputs.maintainer }}
      tier:            ${{ steps.d.outputs.tier }}
    steps:
      - uses: actions/checkout@v4
      - id: d
        run: ./scripts/load-descriptor.sh components/kubectl.yaml >> "$GITHUB_OUTPUT"

  build:
    needs: load-descriptor
    uses: ./.github/workflows/_reusable-build-deb.yml
    with:
      component:       kubectl
      upstream_tag:    ${{ needs.load-descriptor.outputs.upstream_tag }}
      lts_build:       ${{ inputs.lts_build || '1' }}
      bundle:          ${{ needs.load-descriptor.outputs.bundle }}
      fork_repo:       ${{ needs.load-descriptor.outputs.fork_repo }}
      lts_branch:      ${{ needs.load-descriptor.outputs.lts_branch }}
      toolchain_image: ${{ needs.load-descriptor.outputs.toolchain_image }}
      entrypoint:      ${{ needs.load-descriptor.outputs.entrypoint }}
      package_name:    ${{ needs.load-descriptor.outputs.package_name }}
      maintainer:      ${{ needs.load-descriptor.outputs.maintainer }}
    secrets: inherit

  sbom:
    needs: [load-descriptor, build]
    uses: ./.github/workflows/_reusable-sbom.yml
    with:
      target_kind:  deb
      target_ref:   deb-kubectl
      deb_filename: ${{ needs.build.outputs.deb_name }}
      component:    kubectl
      upstream_tag: ${{ needs.load-descriptor.outputs.upstream_tag }}
    secrets: inherit

  scan:
    needs: [load-descriptor, build, sbom]
    uses: ./.github/workflows/_reusable-scan.yml
    with:
      target_kind:  deb
      target_ref:   deb-kubectl
      deb_filename: ${{ needs.build.outputs.deb_name }}
      component:    kubectl
    secrets: inherit

  artifact-smoke:
    needs: [load-descriptor, build]
    uses: ./.github/workflows/_reusable-artifact-smoke.yml
    with:
      target_kind:  deb
      target_ref:   deb-kubectl
      deb_filename: ${{ needs.build.outputs.deb_name }}
      component:    kubectl
    secrets: inherit

  evidence:
    needs: [load-descriptor, build, sbom, scan, artifact-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: sbom-kubectl, path: sbom/ }
      - uses: actions/download-artifact@v4
        with: { name: findings-kubectl, path: scans/ }
      - name: Fetch source-fork test status (v3 §9)
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        run: |
          mkdir -p evidence
          ./scripts/fetch-source-tests.sh \
            --fork "${{ needs.load-descriptor.outputs.fork_repo }}" \
            --branch "${{ needs.load-descriptor.outputs.lts_branch }}" \
            --out evidence/source-tests.json
      - name: Render patch manifest + release metadata
        env:
          UPSTREAM_TAG: ${{ needs.load-descriptor.outputs.upstream_tag }}
          LTS_BUILD:    ${{ inputs.lts_build || '1' }}
          BUNDLE:       ${{ needs.load-descriptor.outputs.bundle }}
          TIER:         ${{ needs.load-descriptor.outputs.tier }}
          TARGET_KIND:  deb
          TARGET_REF:   ${{ needs.build.outputs.deb_name }}
          DEB_VERSION:  ${{ needs.build.outputs.deb_version }}
        run: |
          ./scripts/render-patch-manifest.sh kubectl \
            "${UPSTREAM_TAG}" "${LTS_BUILD}" "${DEB_VERSION}" \
            > evidence/patch-manifest.yaml
          ./scripts/render-release-metadata.sh kubectl evidence/ scans/findings-kubectl.json sbom/sbom-kubectl.cdx.json
      - uses: actions/upload-artifact@v4
        with: { name: evidence-kubectl, path: evidence/, retention-days: 90 }

  sign:
    needs: [load-descriptor, build, sbom, evidence]
    uses: ./.github/workflows/_reusable-sign.yml
    with:
      target_kind:  deb
      target_ref:   deb-kubectl
      deb_filename: ${{ needs.build.outputs.deb_name }}
      component:    kubectl
    secrets: inherit

  gate:
    needs: [load-descriptor, sign, artifact-smoke]
    uses: ./.github/workflows/_reusable-policy-gate.yml
    with:
      component: kubectl
      tier:      ${{ needs.load-descriptor.outputs.tier }}
    secrets: inherit
